<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Paint</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>Minimal Paint</h1>
          <p>Draw with a single brush and save your artwork.</p>
        </div>
        <button id="saveBtn" class="save-btn">Save image</button>
      </header>

      <main class="workspace">
        <section class="toolbar" aria-label="Tools">
          <div class="color-group">
            <button class="color-swatch active" data-color="#111111" style="--swatch: #111111"></button>
            <button class="color-swatch" data-color="#ef4444" style="--swatch: #ef4444"></button>
            <button class="color-swatch" data-color="#3b82f6" style="--swatch: #3b82f6"></button>
            <button class="color-swatch" data-color="#10b981" style="--swatch: #10b981"></button>
            <button class="color-swatch" data-color="#f59e0b" style="--swatch: #f59e0b"></button>
            <button class="color-swatch" data-color="#8b5cf6" style="--swatch: #8b5cf6"></button>
          </div>

          <div class="brush-control">
            <label for="brushSize">Brush size</label>
            <input id="brushSize" type="range" min="1" max="24" value="4" />
          </div>
        </section>

        <section class="canvas-panel">
          <canvas id="paintCanvas" width="800" height="800"></canvas>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
